name: Expo OTA Update

on:
  push:
    branches:
      - master

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install Expo
        run: npm install -g expo-cli eas-cli

      - name: Publish update
        run: eas update --branch production --message "auto update"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}